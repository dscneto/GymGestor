<div class="page-header">
  <div>
    <div class="page-titulo" id="exp-titulo">Nova Aula Experimental</div>
    <div class="page-subtitulo">Preencha os dados para agendar</div>
  </div>
</div>

<div class="form-card">
  <form id="form-experimental">
    <div class="form-grid">

      <div class="form-secao">● Dados do Aluno</div>

      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input class="form-input" id="exp-nome" type="text" placeholder="Ex: Pedro Henrique Lima" required>
      </div>

      <div class="form-group">
        <label class="form-label">Idade</label>
        <input class="form-input" id="exp-idade" type="number" placeholder="Ex: 25" required>
      </div>

      <hr class="form-divider">
      <div class="form-secao">● Dados da Aula</div>

      <div class="form-group">
        <label class="form-label">Modalidade</label>
        <select class="form-select" id="exp-modalidade" required>
          <option value="">Selecione a modalidade</option>
          <option>Jiu-Jitsu</option>
          <option>Muay Thai</option>
          <option>Karatê</option>
          <option>Ninjutsu</option>
          <option>Krav Maga</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Professor</label>
        <select class="form-select" id="exp-professor" required>
          <option value="">Selecione o professor</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" id="exp-data" type="date" required>
      </div>

      <div class="form-group">
        <label class="form-label">Horário</label>
        <input class="form-input" id="exp-horario" type="time" required>
      </div>

      <div class="form-group">
        <label class="form-label">Unidade</label>
        <select class="form-select" id="exp-unidade" required>
          <option value="">Selecione a unidade</option>
          <option>Candeias</option>
          <option>Brasil</option>
        </select>
      </div>

    </div>

    <div class="form-acoes">
      <button type="button" class="btn-ghost" onclick="navegarPara('lista')">Cancelar</button>
      <button type="submit" class="btn-primary" id="exp-btn-salvar">Agendar Aula</button>
    </div>
  </form>
</div>
