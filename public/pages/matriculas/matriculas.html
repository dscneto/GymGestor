<div class="page-header">
  <div>
    <div class="page-titulo" id="mat-titulo">Nova Matrícula</div>
    <div class="page-subtitulo">Cadastro de aluno efetivo</div>
  </div>
</div>

<div class="form-card">
  <form id="form-matricula">
    <div class="form-grid">

      <div class="form-secao">● Dados do Aluno</div>

      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input class="form-input" id="mat-nome" type="text" required>
      </div>

      <div class="form-group">
        <label class="form-label">Data de Nascimento</label>
        <input class="form-input" id="mat-nascimento" type="date" required>
      </div>

      <div class="form-group">
        <label class="form-label">CPF</label>
        <input class="form-input" id="mat-cpf" type="text" placeholder="000.000.000-00">
      </div>

      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input class="form-input" id="mat-telefone" type="text" placeholder="(00) 00000-0000">
      </div>

      <div class="form-group">
        <label class="form-label">Unidade</label>
        <select class="form-select" id="mat-unidade" required onchange="atualizarHorarios()">
          <option value="">Selecione a unidade</option>
          <option>Candeias</option>
          <option>Brasil</option>
        </select>
      </div>

      <hr class="form-divider">
      <div class="form-secao">● Endereço</div>

      <div class="form-group">
        <label class="form-label">Rua</label>
        <input class="form-input" id="mat-rua" type="text" placeholder="Ex: Rua das Flores">
      </div>

      <div class="form-group">
        <label class="form-label">Número</label>
        <input class="form-input" id="mat-numero" type="text" placeholder="Ex: 123">
      </div>

      <div class="form-group">
        <label class="form-label">Bairro</label>
        <input class="form-input" id="mat-bairro" type="text" placeholder="Ex: Centro">
      </div>

      <div class="form-group">
        <label class="form-label">Cidade</label>
        <input class="form-input" id="mat-cidade" type="text" placeholder="Ex: Vitória da Conquista">
      </div>

      <hr class="form-divider">
      <div class="form-secao">● Responsável</div>

      <div class="form-group">
        <label class="form-label">Nome do responsável</label>
        <input class="form-input" id="mat-resp-nome" type="text">
      </div>

      <div class="form-group">
        <label class="form-label">Contato do responsável</label>
        <input class="form-input" id="mat-resp-contato" type="text" placeholder="(00) 00000-0000">
      </div>

      <hr class="form-divider">
      <div class="form-secao">● Matrícula</div>

      <div class="form-group">
        <label class="form-label">Modalidade</label>
        <select class="form-select" id="mat-modalidade" required onchange="atualizarHorarios()">
          <option value="">Selecione a modalidade</option>
          <option>Jiu-Jitsu</option>
          <option>Muay Thai</option>
          <option>Karatê</option>
          <option>Ninjutsu</option>
          <option>Krav Maga</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Professor</label>
        <select class="form-select" id="mat-professor" required>
          <option value="">Selecione o professor</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Data de matrícula</label>
        <input class="form-input" id="mat-data" type="date" required>
      </div>

      <div class="form-group">
        <label class="form-label">Vencimento (dia do mês)</label>
        <input class="form-input" id="mat-vencimento" type="number" min="1" max="31" placeholder="Ex: 10" required>
      </div>

      <div class="form-group">
        <label class="form-label">Valor da mensalidade (R$)</label>
        <input class="form-input" id="mat-valor" type="number" step="0.01" placeholder="Ex: 150.00">
      </div>

      <div class="form-group full" id="container-horarios"></div>

      <hr class="form-divider">
      <div class="form-secao">● Observações</div>

      <div class="form-group full">
        <label class="form-label">Observações</label>
        <textarea class="form-textarea" id="mat-observacoes" rows="3" placeholder="Informações adicionais..."></textarea>
      </div>

    </div>

    <div class="form-acoes">
      <button type="button" class="btn-ghost" onclick="navegarPara('matriculados')">Cancelar</button>
      <button type="submit" class="btn-primary" id="mat-btn-salvar">Cadastrar Aluno</button>
    </div>
  </form>
</div>
