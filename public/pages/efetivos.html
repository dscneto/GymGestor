<section id="page-efetivos" class="page">

      <div class="page-header">
          <div>
                <div class="page-titulo">Alunos Efetivos</div>
                      <div class="page-subtitulo" id="efetivos-subtitulo">0 alunos cadastrados</div>
                          </div>
                              <button class="btn-primary" onclick="abrirFormEfetivo()">+ Novo Aluno</button>
                                </div>

                                  <div class="filtros-row">
                                      <input class="input-busca" id="efetivos-busca" type="text" placeholder="Buscar aluno...">
                                          <select class="filtro-select" id="efetivos-unidade">
                                                <option value="">Todas as unidades</option>
                                                      <option>Candeias</option>
                                                            <option>Brasil</option>
                                                                </select>
                                                                    <select class="filtro-select" id="efetivos-modalidade">
                                                                          <option value="">Todas as modalidades</option>
                                                                                <option>Jiu-Jitsu</option>
                                                                                      <option>Muay Thai</option>
                                                                                            <option>Karatê</option>
                                                                                                  <option>Ninjutsu</option>
                                                                                                        <option>Krav Maga</option>
                                                                                                            </select>
                                                                                                              </div>

                                                                                                                <div class="table-card">
                                                                                                                    <table class="data-table">
                                                                                                                          <thead>
                                                                                                                                  <tr>
                                                                                                                                            <th>Aluno</th>
                                                                                                                                                      <th>CPF</th>
                                                                                                                                                                <th>Telefone</th>
                                                                                                                                                                          <th>Unidade</th>
                                                                                                                                                                                    <th>Modalidades</th>
                                                                                                                                                                                              <th>Responsável</th>
                                                                                                                                                                                                        <th></th>
                                                                                                                                                                                                                </tr>
                                                                                                                                                                                                                      </thead>
                                                                                                                                                                                                                            <tbody id="tbody-efetivos"></tbody>
                                                                                                                                                                                                                                </table>
                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                    <div id="modal-efetivo" style="display:none;">
                                                                                                                                                                                                                                        <div class="form-card" style="margin-top: 1.5rem;">
                                                                                                                                                                                                                                              <form id="form-efetivo">
                                                                                                                                                                                                                                                      <div class="form-grid">

                                                                                                                                                                                                                                                                <div class="form-secao" id="ef-form-titulo">● Dados do Aluno</div>

                                                                                                                                                                                                                                                                          <div class="form-group">
                                                                                                                                                                                                                                                                                      <label class="form-label">Nome completo</label>
                                                                                                                                                                                                                                                                                                  <input class="form-input" id="ef-nome" type="text" required>
                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                      <div class="form-group">
                                                                                                                                                                                                                                                                                                                                  <label class="form-label">Data de Nascimento</label>
                                                                                                                                                                                                                                                                                                                                              <input class="form-input" id="ef-nascimento" type="date" required>
                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                  <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                              <label class="form-label">CPF</label>
                                                                                                                                                                                                                                                                                                                                                                                          <input class="form-input" id="ef-cpf" type="text" placeholder="000.000.000-00" required>
                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                              <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                          <label class="form-label">Telefone</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                      <input class="form-input" id="ef-telefone" type="text" placeholder="(00) 00000-0000">
                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <label class="form-label">Unidade</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <select class="form-select" id="ef-unidade" required onchange="atualizarHorarios()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option value="">Selecione a unidade</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option>Candeias</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option>Brasil</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <hr class="form-divider">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="form-secao">● Responsável</div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label class="form-label">Nome do responsável</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input class="form-input" id="ef-resp-nome" type="text" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label class="form-label">Contato do responsável</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input class="form-input" id="ef-resp-contato" type="text" placeholder="(00) 00000-0000" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <hr class="form-divider">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="form-secao">● Matrícula</div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <label class="form-label">Modalidade</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select class="form-select" id="ef-modalidade" required onchange="atualizarHorarios()">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option value="">Selecione a modalidade</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option>Jiu-Jitsu</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option>Muay Thai</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option>Karatê</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <option>Ninjutsu</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option>Krav Maga</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="form-group full" id="container-horarios"></div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <label class="form-label">Professor</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <select class="form-select" id="ef-professor" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="">Selecione o professor</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option>Zenon Cruz</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Kesiah Sales</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option>Thaís Lebrão</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <option>ASDOKS</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option>Jamerson</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option>Ruan Lessa</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <option>João Paulo</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option>Luciano Leal</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option>Dyonatans</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option>Sergio Doria</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <label class="form-label">Data de matrícula</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <input class="form-input" id="ef-data-matricula" type="date" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <label class="form-label">Vencimento (dia do mês)</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input class="form-input" id="ef-vencimento" type="number" min="1" max="31" placeholder="Ex: 10" required>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="form-acoes">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button type="button" class="btn-ghost" onclick="fecharFormEfetivo()">Cancelar</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <button type="submit" class="btn-primary" id="ef-btn-salvar">Cadastrar Aluno</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </form>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </section>
