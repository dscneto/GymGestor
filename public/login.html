<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dojo System — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: #f0f0f0;
    }

    .login-logo span {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #666;
    }

    .form-input {
      height: 44px;
      padding: 0 14px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #0f0f0f;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      color: #f0f0f0;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus {
      border-color: #D85A30;
      box-shadow: 0 0 0 3px rgba(216, 90, 48, 0.12);
    }

    .form-input::placeholder { color: #444; }

    .btn-login {
      width: 100%;
      height: 44px;
      background: #D85A30;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.15s;
    }

    .btn-login:hover { opacity: 0.9; }

    .erro-msg {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <h1>Dojo<br>System</h1>
      <span>Gestão da Academia</span>
    </div>

    <form id="form-login">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <input class="form-input" id="login-usuario" type="text" placeholder="seu usuario" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="login-senha" type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="ph ph-sign-in"></i> Entrar
      </button>
      <div class="erro-msg" id="erro-login">Usuário ou senha incorretos.</div>
    </form>
  </div>

  <script>
    // Se já tem token válido, vai direto pro sistema
    const token = localStorage.getItem('token');
    if (token) window.location.href = '/index.html';

    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();

      const usuario = document.getElementById('login-usuario').value;
      const senha   = document.getElementById('login-senha').value;

      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      });

      const dados = await resp.json();

      if (!resp.ok) {
        document.getElementById('erro-login').style.display = 'block';
        return;
      }

      localStorage.setItem('token',  dados.token);
      localStorage.setItem('perfil', dados.perfil);
      localStorage.setItem('nome',   dados.nome);

      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
